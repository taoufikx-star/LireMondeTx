<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LireMonde — Admin</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="logo">Lire<span>Monde</span></a>
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="alire.html">À lire</a></li>
        <li><a href="admin.html" class="actif">Admin</a></li>
      </ul>
      <div class="nav-search">
        <input type="text" id="recherche" placeholder="Rechercher…"/>
      </div>
    </div>
  </nav>

  <main>

    <div class="form-card">
      <h2 id="form-titre">➕ Ajouter un livre</h2>
      <input type="hidden" id="champ-id"/>
      <form id="form-livre">
        <div class="fg">
          <label>Titre</label>
          <input type="text" id="champ-titre" placeholder="Ex: Le Petit Prince" required/>
        </div>
        <div class="fg">
          <label>Auteur</label>
          <input type="text" id="champ-auteur" placeholder="Ex: Antoine de Saint-Exupéry" required/>
        </div>
        <div class="fg">
          <label>Genre</label>
          <select id="champ-genre">
            <option value="Classique">Classique</option>
            <option value="Science-fiction">Science-fiction</option>
            <option value="Drame">Drame</option>
            <option value="Fantasy">Fantasy</option>
          </select>
        </div>
        <div class="fg">
          <label>Description</label>
          <textarea id="champ-description" placeholder="Résumé du livre..." required></textarea>
        </div>
        <div class="fg">
          <label>URL Couverture</label>
          <input type="text" id="champ-couverture" placeholder="https://..."/>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-or" id="btn-submit">➕ Ajouter le livre</button>
          <button type="button" class="btn btn-ghost" id="btn-annuler" style="display:none">✕ Annuler</button>
        </div>
      </form>
    </div>

    <div class="table-card">
      <h2>📚 Liste des livres</h2>
      <table>
        <thead>
          <tr>
            <th>Titre</th>
            <th>Auteur</th>
            <th>Genre</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="corps-tableau"></tbody>
      </table>
    </div>

  </main>

  <footer><strong>LireMonde</strong> © 2025 — ReadSphere</footer>

  <script src="script.js"></script>
</body>
</html>
