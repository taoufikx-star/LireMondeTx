<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LireMonde — Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">📚 LireMonde</a>
    <ul>
      <li><a href="index.html">Accueil</a></li>
      <li><a href="alire.html">À lire</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>

  <main>
    <h1>⚙️ Administration</h1>

    <form id="form-livre">
      <h2 id="form-titre">➕ Ajouter un livre</h2>

      <input type="hidden" id="champ-id" />

      <div class="champ">
        <label>Titre</label>
        <input type="text" id="champ-titre" placeholder="Titre du livre" required />
      </div>

      <div class="champ">
        <label>Auteur</label>
        <input type="text" id="champ-auteur" placeholder="Prénom Nom" required />
      </div>

      <div class="champ">
        <label>Genre</label>
        <select id="champ-genre">
          <option value="Classique">Classique</option>
          <option value="Science-fiction">Science-fiction</option>
          <option value="Drame">Drame</option>
          <option value="Fantasy">Fantasy</option>
        </select>
      </div>

      <div class="champ">
        <label>Description</label>
        <textarea id="champ-desc" placeholder="Résumé..."></textarea>
      </div>

      <div class="champ">
        <label>URL image couverture</label>
        <input type="text" id="champ-img" placeholder="https://..." />
      </div>

      <button type="submit" class="btn-submit" id="btn-submit">➕ Ajouter</button>
      <button type="button" class="btn-cancel" id="btn-annuler" style="display:none">Annuler</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Titre</th>
          <th>Auteur</th>
          <th>Genre</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="corps-tableau"></tbody>
    </table>
  </main>

  <footer>LireMonde © 2025 — ReadSphere</footer>

  <script src="app.js"></script>
</body>
</html>
